name: Build and Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Client (${{ matrix.rid }})
      run: dotnet publish SimpleTLSTunnelClient/SimpleTLSTunnelClient.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/client

    - name: Publish Server (${{ matrix.rid }})
      run: dotnet publish SimpleTLSTunnelServer/SimpleTLSTunnelServer.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/server

    - name: Upload Client artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleTLSTunnelClient-${{ matrix.rid }}
        path: publish/client/

    - name: Upload Server artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleTLSTunnelServer-${{ matrix.rid }}
        path: publish/server/

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create zip archives
      run: |
        cd artifacts
        for dir in */; do
          name="${dir%/}"
          zip -r "${name}.zip" "$dir"
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.zip
        generate_release_notes: true
