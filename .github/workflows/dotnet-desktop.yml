name: build and release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: setup .net 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: restore dependencies
      run: dotnet restore

    - name: publish client (${{ matrix.rid }})
      run: dotnet publish SimpleTLSTunnelClient/SimpleTLSTunnelClient.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/client

    - name: publish server (${{ matrix.rid }})
      run: dotnet publish SimpleTLSTunnelServer/SimpleTLSTunnelServer.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/server

    - name: upload client artifact
      uses: actions/upload-artifact@v4
      with:
        name: simpletlstunnelclient-${{ matrix.rid }}
        path: publish/client/

    - name: upload server artifact
      uses: actions/upload-artifact@v4
      with:
        name: simpletlstunnelserver-${{ matrix.rid }}
        path: publish/server/

  docker:
    name: docker ${{ matrix.component }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: client
            context: .
            dockerfile: SimpleTLSTunnelClient/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/simpletlstunnelclient
          - component: server
            context: .
            dockerfile: SimpleTLSTunnelServer/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/simpletlstunnelserver

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: set up qemu
      uses: docker/setup-qemu-action@v3

    - name: set up buildx
      uses: docker/setup-buildx-action@v3

    - name: log in to ghcr
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ matrix.image }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=ref,event=branch
          type=sha,prefix=sha-

    - name: build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  release:
    name: create github release
    needs: [ build, docker ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: create zip archives
      run: |
        cd artifacts
        for dir in */; do
          name="${dir%/}"
          zip -r "${name}.zip" "$dir"
        done

    - name: create github release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.zip
        generate_release_notes: true
